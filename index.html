<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Board Games Collection</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/catalog.css" />
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <main class="app-container">
      <div id="catalog-view">
        <header>
          <h1>Board Games Catalog</h1>
          <nav id="filters">
            <input type="text" id="search-input" placeholder="Пошук гри..." />
          </nav>
        </header>
        <div id="content-area">
            <p style="text-align: center">Loading collection...</p>
        </div> 

        <footer class="table-edge-footer">
          <!-- Заглушки об'єктів для майбутніх пнг -->
          <div class="scattered-item card-deck placeholder" title="Пачка карт"></div>
          <div class="scattered-item meeple meeple-1 placeholder" title="Червоний міпл"></div>
          <div class="scattered-item meeple meeple-2 placeholder" title="Жовтий міпл"></div>
          <div class="scattered-item meeple meeple-3 placeholder" title="Синій міпл"></div>
          <div class="scattered-item coin coin-1 placeholder" title="Монетка"></div>
          <div class="scattered-item coin coin-2 placeholder" title="Монетка"></div>
          <div class="scattered-item coin coin-3 placeholder" title="Монетка"></div>
          <div class="scattered-item pencil placeholder" title="Олівець"></div>
          <div class="scattered-item score-sheet placeholder" title="Аркуш для очок"></div>
          
          <!-- Ретельна CSS-перемальовка GameBoy з падаючим Тетрісом -->
          <div class="scattered-item gameboy" title="GameBoy">
            <!-- Заглибини на корпусі -->
            <div class="gb-top-groove"></div>
            <div class="gb-corner-grooves"></div>
            
            <div class="gb-screen-bezel">
              <div class="gb-power"></div>
              <div class="gb-screen">
                <div class="tetris-grid">
                  <!-- Падаючий L-блок -->
                  <div class="tetris-pixel" style="top: 15px; left: 40px;"></div>
                  <div class="tetris-pixel" style="top: 25px; left: 40px;"></div>
                  <div class="tetris-pixel" style="top: 35px; left: 40px;"></div>
                  <div class="tetris-pixel" style="top: 35px; left: 50px;"></div>
                  
                  <!-- Побудовані блоки знизу -->
                  <div class="tetris-pixel" style="bottom: 5px; left: 10px;"></div>
                  <div class="tetris-pixel" style="bottom: 5px; left: 20px;"></div>
                  <div class="tetris-pixel" style="bottom: 5px; left: 30px;"></div>
                  <div class="tetris-pixel" style="bottom: 15px; left: 20px;"></div>
                  <div class="tetris-pixel" style="bottom: 5px; left: 60px;"></div>
                  <div class="tetris-pixel" style="bottom: 15px; left: 60px;"></div>
                  <div class="tetris-pixel" style="bottom: 25px; left: 60px;"></div>
                </div>
              </div>
            </div>
            <div class="gb-controls">
              <div class="gb-dpad">
                <div class="d-pad-v"></div>
                <div class="d-pad-h"></div>
              </div>
              <div class="gb-buttons">
                <div class="gb-btn b-btn">B</div>
                <div class="gb-btn a-btn">A</div>
              </div>
            </div>
            <div class="gb-start-select">
              <div class="ss-btn"></div>
              <div class="ss-btn"></div>
            </div>
          </div>
          <!-- Заглушки об'єктів для майбутніх пнг -->
        </footer>
      </div>

      <div id="game-page-view" class="hidden"></div>
    </main>

    <script type="module" src="js/script.js"></script>
  </body>
</html>
