<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Board Games Collection</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <main class="app-container">
      <div id="catalog-view">
        <!-- Checkbox for theme toggle (visual state) -->
        <input type="checkbox" id="theme-toggle-chk" style="display: none;" />

        <header class="header-diorama">
          <!-- Desk Lamp Base (Step 2 - Day/Night toggle placeholder) -->
          <div class="desk-lamp" title="Desk Lamp">
            <img src="assets/textures/lapm1.webp" class="lamp-image" alt="Desk Lamp" />
            
            <div class="lamp-button-container">
              <label class="lamp-button" for="theme-toggle-chk"></label>
            </div>
          </div>

          <div id="felt-header">
            <img src="assets/textures/table1.webp" class="felt-bg-img" alt="">
          <div class="scrabble-board">
            <div class="scrabble-word board">
              <div class="scrabble-tile"><span class="letter">B</span><span class="value">3</span></div>
              <div class="scrabble-tile"><span class="letter">O</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">A</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">R</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">D</span><span class="value">2</span></div>
            </div>
            <div class="scrabble-word games">
              <div class="scrabble-tile"><span class="letter">G</span><span class="value">2</span></div>
              <div class="scrabble-tile"><span class="letter">A</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">M</span><span class="value">3</span></div>
              <div class="scrabble-tile"><span class="letter">E</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">S</span><span class="value">1</span></div>
            </div>
            <div class="scrabble-word catalog">
              <div class="scrabble-tile"><span class="letter">C</span><span class="value">3</span></div>
              <div class="scrabble-tile"><span class="letter">A</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">T</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">A</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">L</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">O</span><span class="value">1</span></div>
              <div class="scrabble-tile"><span class="letter">G</span><span class="value">2</span></div>
            </div>
          </div>
          </div>

          <!-- Meeple Randomizer -->
          <div class="meeple-container" id="meeple-container" title="Хто ходить першим?">
            <img src="assets/textures/meeple.webp" class="meeple-img" alt="Meeple">
            <div class="meeple-bubble" id="meeple-bubble">Хто наймолодший - той ходить першим!</div>
          </div>

          <!-- Clipboard Filters & Search -->
          <div class="clipboard-board">
            <img class="clipboard-bg" src="assets/textures/clipboard.webp" alt="Clipboard">
            <div class="clipboard-content">
              <h2 class="handwriting-text clipboard-title">Search & Filters</h2>
              <input type="text" id="search-input" class="clipboard-input handwriting-text" placeholder="Знайти гру..." autocomplete="off">
              
              <div class="clipboard-filters">
                <div class="lang-filters">
                  <label class="handwriting-text circle-checkbox">
                    <input type="checkbox" id="lang-uk" value="uk"> <span class="circle-mark">Українська</span>
                  </label>
                  <label class="handwriting-text circle-checkbox">
                    <input type="checkbox" id="lang-en" value="en"> <span class="circle-mark">English</span>
                  </label>
                  <label class="handwriting-text circle-checkbox">
                    <input type="checkbox" id="lang-de" value="de"> <span class="circle-mark">Deutsch</span>
                  </label>
                  <label class="handwriting-text circle-checkbox">
                    <input type="checkbox" id="lang-ind" value="ind"> <span class="circle-mark">Мовонезалежна</span>
                  </label>
                </div>
                
                <div class="slider-group">
                  <label class="handwriting-text">Гравців (Від <span id="players-val-min">-</span> до <span id="players-val-max">-</span>):</label>
                  <div class="dual-slider-wrapper" id="players-slider-wrapper">
                    <div class="dual-slider-track"></div>
                    <div class="dual-slider-fill" id="players-fill"></div>
                    <input type="range" id="players-min" class="dual-slider" min="0" value="0">
                    <input type="range" id="players-max" class="dual-slider" min="0" value="10">
                  </div>
                </div>
                <div class="slider-group">
                  <label class="handwriting-text">Хвилин (Від <span id="time-val-min">-</span> до <span id="time-val-max">-</span>):</label>
                  <div class="dual-slider-wrapper" id="time-slider-wrapper">
                    <div class="dual-slider-track"></div>
                    <div class="dual-slider-fill" id="time-fill"></div>
                    <input type="range" id="time-min" class="dual-slider" min="0" step="5" value="0">
                    <input type="range" id="time-max" class="dual-slider" min="0" step="5" value="120">
                  </div>
                </div>
              </div>

              <!-- Hand-Drawn Randomizer Button -->
              <button class="drawn-btn" id="game-randomizer-btn">Рандомайзер</button>
              <p class="marauder-text handwriting-text" id="marauder-text">I solemnly swear that I am up to no good...</p>
            </div>
          </div>
        </header>

        <div id="content-area">
          <p style="text-align: center">Loading collection...</p>
        </div>

        <footer class="table-edge-footer">
          <!-- Заглушки об'єктів для майбутніх пнг -->
          <div
            class="scattered-item card-deck placeholder"
            title="Пачка карт"
          ></div>
          <div
            class="scattered-item meeple meeple-1 placeholder"
            title="Червоний міпл"
          ></div>
          <div
            class="scattered-item meeple meeple-2 placeholder"
            title="Жовтий міпл"
          ></div>
          <div
            class="scattered-item meeple meeple-3 placeholder"
            title="Синій міпл"
          ></div>
          <div
            class="scattered-item coin coin-1 placeholder"
            title="Монетка"
          ></div>
          <div
            class="scattered-item coin coin-2 placeholder"
            title="Монетка"
          ></div>
          <div
            class="scattered-item coin coin-3 placeholder"
            title="Монетка"
          ></div>
          <div class="scattered-item pencil placeholder" title="Олівець"></div>
          <div
            class="scattered-item score-sheet placeholder"
            title="Аркуш для очок"
          ></div>

          <!-- Ретельна CSS-перемальовка GameBoy з падаючим Тетрісом -->
          <div class="scattered-item gameboy" title="GameBoy">
            <!-- Заглибини на корпусі -->
            <div class="gb-top-groove"></div>
            <div class="gb-corner-grooves"></div>

            <div class="gb-screen-bezel">
              <div class="gb-power"></div>
              <div class="gb-screen">
                <div class="tetris-grid">
                  <!-- Падаючий L-блок -->
                  <div class="tetris-pixel" style="top: 15px; left: 40px"></div>
                  <div class="tetris-pixel" style="top: 25px; left: 40px"></div>
                  <div class="tetris-pixel" style="top: 35px; left: 40px"></div>
                  <div class="tetris-pixel" style="top: 35px; left: 50px"></div>

                  <!-- Побудовані блоки знизу -->
                  <div
                    class="tetris-pixel"
                    style="bottom: 5px; left: 10px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 5px; left: 20px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 5px; left: 30px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 15px; left: 20px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 5px; left: 60px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 15px; left: 60px"
                  ></div>
                  <div
                    class="tetris-pixel"
                    style="bottom: 25px; left: 60px"
                  ></div>
                </div>
              </div>
            </div>
            <div class="gb-controls">
              <div class="gb-dpad">
                <div class="d-pad-v"></div>
                <div class="d-pad-h"></div>
              </div>
              <div class="gb-buttons">
                <div class="gb-btn b-btn">B</div>
                <div class="gb-btn a-btn">A</div>
              </div>
            </div>
            <div class="gb-start-select">
              <div class="ss-btn"></div>
              <div class="ss-btn"></div>
            </div>
          </div>
          <!-- Заглушки об'єктів для майбутніх пнг -->
        </footer>
      </div>

      <div id="game-page-view" class="hidden"></div>
    </main>

    <script type="module" src="js/script.js"></script>
  </body>
</html>
